// Glosses data
const glosses = {
  "12:1": [{"phrase":"son of Amoz","note":"Not the prophet Amos; Amoz was Isaiah\u2019s father, likely of a noble Judahite family.","category":"historical"}],
  "12:2": [{"phrase":"the mountain of the Lord\u2019s house","note":"Mount Moriah in Jerusalem, site of Solomon\u2019s temple.","category":"geographic"},{"phrase":"in the top of the mountains","note":"Isaiah pictures the temple mount raised above all peaks \u2014 the highest point on earth.","category":"literary"}],
  "12:3": [{"phrase":"house of the God of Jacob","note":"The Jerusalem temple.","category":"geographic"},{"phrase":"out of Zion shall go forth the law","note":"Zion and Jerusalem are used as parallel terms for the same holy city.","category":"geographic"}],
  "12:4": [{"phrase":"beat their swords into plow-shares","note":"Farm tools forged from weapons \u2014 a reversal of Joel 3:10, which says the opposite.","category":"cultural"},{"phrase":"pruning-hooks","note":"Curved blades used to trim grapevines \u2014 a common tool in Israelite agriculture.","category":"cultural"}],
  "12:5": [{"phrase":"house of Jacob","note":"The covenant people of Israel, descended from the patriarch Jacob.","category":"historical"}],
  "12:6": [{"phrase":"replenished from the east","note":"Filled with pagan practices from Mesopotamia \u2014 Babylon, Assyria, and surrounding cultures.","category":"historical"},{"phrase":"soothsayers like the Philistines","note":"Fortune-tellers. The Philistines, Israel\u2019s coastal neighbors, were known for divination.","category":"cultural"},{"phrase":"please themselves in the children of strangers","note":"Forming alliances (or intermarrying) with foreign nations instead of trusting God.","category":"cultural"}],
  "12:7": [{"phrase":"full of horses","note":"Horses and chariots were offensive military technology \u2014 a sign of reliance on human power rather than God (see Deut. 17:16).","category":"cultural"}],
  "12:9": [{"phrase":"the mean man","note":"\u201CMean\u201D here means common or ordinary \u2014 the everyday person, not someone cruel.","category":"literary"}],
  "12:12": [{"phrase":"the day of the Lord of Hosts","note":"A recurring Old Testament concept: a future time when God acts decisively to judge the proud and deliver the humble.","category":"literary"}],
  "12:13": [{"phrase":"cedars of Lebanon","note":"The tallest, most prized trees in the ancient world \u2014 used to build palaces and temples. A symbol of towering pride.","category":"geographic"},{"phrase":"oaks of Bashan","note":"Bashan (modern Golan Heights) was famous for its massive oak forests. Second only to Lebanon\u2019s cedars as a symbol of strength.","category":"geographic"}],
  "12:15": [{"phrase":"fenced wall","note":"A fortified wall \u2014 the military defenses cities relied on for survival.","category":"cultural"}],
  "12:16": [{"phrase":"ships of Tarshish","note":"Large merchant vessels for long-distance trade. Tarshish was likely in Spain or Sardinia \u2014 the edge of the known world.","category":"geographic"},{"phrase":"pleasant pictures","note":"Probably luxury goods or fine craftsmanship \u2014 the Hebrew suggests beautiful display vessels or carved imagery.","category":"cultural"}],
  "13:1": [{"phrase":"the stay and the staff","note":"Everything a society leans on \u2014 all its supports. Isaiah then lists what those supports are.","category":"literary"},{"phrase":"the whole staff of bread, and the whole stay of water","note":"The most basic necessities \u2014 food and water supply. When these fail, everything collapses.","category":"cultural"}],
  "13:2": [{"phrase":"the prudent","note":"Someone skilled in reading omens or interpreting signs \u2014 not necessarily a positive role.","category":"cultural"},{"phrase":"the ancient","note":"The elder \u2014 a community leader whose authority came from age and experience.","category":"cultural"}],
  "13:3": [{"phrase":"captain of fifty","note":"A military officer commanding a unit of fifty soldiers \u2014 a mid-rank leader in the Israelite army.","category":"historical"},{"phrase":"the honorable man","note":"A man of social rank or influence \u2014 literally, one whose face is \u201Clifted up\u201D in the community.","category":"cultural"},{"phrase":"cunning artificer","note":"A skilled craftsman \u2014 metalworker, builder, or engineer. \u201CCunning\u201D here means expert, not deceitful.","category":"literary"},{"phrase":"eloquent orator","note":"One skilled in persuasive speech. Some scholars read the Hebrew as \u201Cskilled in charms\u201D (enchanter).","category":"cultural"}],
  "13:4": [{"phrase":"children unto them to be their princes","note":"Inexperienced, unqualified rulers \u2014 the opposite of the wise leaders just listed. A sign of total social collapse.","category":"literary"}],
  "13:5": [{"phrase":"the base against the honorable","note":"Social order inverted \u2014 the lowly disrespect those of rank. Isaiah is describing anarchy.","category":"literary"}],
  "13:6": [{"phrase":"Thou hast clothing, be thou our ruler","note":"Things are so desperate that simply owning a coat qualifies someone to lead \u2014 everyone else has been stripped bare.","category":"literary"}],
  "13:9": [{"phrase":"their sin to be even as Sodom","note":"Sodom (Genesis 18\u201319) was the ultimate example of a city destroyed for its wickedness. The comparison means Judah\u2019s sin is open and shameless.","category":"historical"}],
  "13:12": [{"phrase":"children are their oppressors, and women rule over them","note":"Not a statement about women or children in general \u2014 Isaiah is saying the expected leaders have failed, and the social order is upside down.","category":"literary"}],
  "13:14": [{"phrase":"ye have eaten up the vineyard","note":"The vineyard is Israel (see Isaiah 5:1\u20137). The leaders have devoured what they were supposed to tend.","category":"literary"}],
  "13:15": [{"phrase":"grind the faces of the poor","note":"A vivid image of economic oppression \u2014 crushing people like grain between millstones.","category":"literary"}],
  "13:16": [{"phrase":"daughters of Zion","note":"The wealthy women of Jerusalem. Isaiah uses their luxury as a symbol of the whole city\u2019s misplaced priorities.","category":"cultural"},{"phrase":"stretched-forth necks","note":"A haughty posture \u2014 head tilted back, looking down at others.","category":"cultural"},{"phrase":"wanton eyes","note":"Flirtatious glances. The Hebrew suggests eyes painted or decorated to attract attention.","category":"cultural"},{"phrase":"mincing as they go","note":"Taking small, affected steps \u2014 possibly because of ankle chains that restricted their stride (see v. 18).","category":"cultural"},{"phrase":"making a tinkling with their feet","note":"Ankle bracelets with bells or ornamental chains that jingled with each step.","category":"cultural"}],
  "13:17": [{"phrase":"smite with a scab the crown of the head","note":"A skin disease on the most visible part of the body \u2014 public humiliation replacing public vanity.","category":"literary"}],
  "13:18": [{"phrase":"tinkling ornaments","note":"Ankle bracelets, probably with small bells or chains.","category":"cultural"},{"phrase":"cauls","note":"Ornamental hairnets or headbands, often beaded.","category":"cultural"},{"phrase":"round tires like the moon","note":"Crescent-shaped pendants worn as necklaces \u2014 \u201Ctires\u201D means headdresses or ornaments, not wheels.","category":"cultural"}],
  "13:19": [{"phrase":"mufflers","note":"Veils or long scarves covering the face and neck.","category":"cultural"}],
  "13:20": [{"phrase":"bonnets","note":"Elaborate headdresses or turbans.","category":"cultural"},{"phrase":"ornaments of the legs","note":"Decorative ankle chains connecting the feet \u2014 these also caused the \u201Cmincing\u201D walk of v. 16.","category":"cultural"},{"phrase":"tablets","note":"Perfume boxes or scent bottles \u2014 the Hebrew literally means \u201Chouses of the soul\u201D (i.e., containers for fragrance).","category":"cultural"}],
  "13:22": [{"phrase":"changeable suits of apparel","note":"Festival robes \u2014 fine garments kept for special occasions.","category":"cultural"},{"phrase":"wimples","note":"Outer cloaks or shawls draped over the body.","category":"cultural"},{"phrase":"crisping-pins","note":"Despite the name, probably money-bags or ornamental purses \u2014 not hair pins.","category":"cultural"}],
  "13:23": [{"phrase":"glasses","note":"Polished metal mirrors \u2014 not eyeglasses, which wouldn\u2019t exist for another two thousand years.","category":"cultural"}],
  "13:24": [{"phrase":"instead of a girdle, a rent","note":"Instead of a fine sash, a rope. \u201CRent\u201D here means a torn strip of cloth.","category":"cultural"},{"phrase":"a stomacher","note":"A richly embroidered chest garment \u2014 replaced by rough sackcloth, the garment of mourning.","category":"cultural"},{"phrase":"burning instead of beauty","note":"A brand-mark (from captivity or slavery) replacing their carefully maintained appearance.","category":"cultural"}],
  "13:26": [{"phrase":"her gates shall lament and mourn","note":"City gates were the center of public life \u2014 where courts met, business happened, and news spread. Empty gates meant a dead city.","category":"cultural"},{"phrase":"she shall be desolate, and shall sit upon the ground","note":"Sitting on the ground was the posture of mourning and humiliation (see Lamentations 1:1).","category":"cultural"}],
  "14:1": [{"phrase":"seven women shall take hold of one man","note":"So many men have died in war (13:25) that seven women share one husband. The number seven suggests completeness \u2014 the devastation is total.","category":"historical"},{"phrase":"we will eat our own bread, and wear our own apparel","note":"Normally a husband provided food and clothing. These women waive that right \u2014 they only want his name to avoid the social shame of being unmarried and childless.","category":"cultural"},{"phrase":"to take away our reproach","note":"In ancient Israel, being unmarried and childless was considered a deep disgrace for a woman.","category":"cultural"}],
  "14:2": [{"phrase":"the branch of the Lord","note":"A sprouting shoot from a seemingly dead stump \u2014 new life after devastation. A recurring prophetic image (see also Isa. 11:1, Jer. 23:5, Zech. 3:8).","category":"literary"},{"phrase":"them that are escaped of Israel","note":"The surviving remnant \u2014 those who endure the judgment described in chapters 12\u201313.","category":"literary"}],
  "14:3": [{"phrase":"written among the living in Jerusalem","note":"An ancient concept of a divine registry \u2014 a book of those counted as belonging to God\u2019s people (see Exod. 32:32, Ps. 69:28).","category":"cultural"}],
  "14:4": [{"phrase":"the spirit of judgment and by the spirit of burning","note":"Purification through judgment \u2014 like refining metal with fire to burn away impurities.","category":"literary"}],
  "14:5": [{"phrase":"a cloud and smoke by day and the shining of a flaming fire by night","note":"Echoes the Exodus (Exod. 13:21\u201322), when God guided Israel with a pillar of cloud by day and fire by night. The protection returns.","category":"historical"},{"phrase":"upon all the glory of Zion shall be a defence","note":"The Hebrew word is chuppah \u2014 a canopy or wedding covering. God shelters the renewed Zion like a bride.","category":"literary"}],
  "14:6": [{"phrase":"a tabernacle","note":"A shelter or booth \u2014 echoing both the wilderness tabernacle and the harvest booths of the Feast of Tabernacles (Sukkot).","category":"cultural"}]
};

// Build HTML
const container = document.getElementById('content');

const pericopes = {
  "12:2": "The Mountain of the Lord",
  "12:5": "Judah\u2019s Idolatry",
  "12:10": "The Day of the Lord",
  "13:1": "Collapse of Leadership",
  "13:9": "Open Shame",
  "13:12": "The Lord\u2019s Indictment",
  "13:16": "The Daughters of Zion",
  "13:18": "The Catalog of Luxury",
  "13:24": "The Reversal",
  "14:1": "Seven Women",
  "14:2": "The Branch of the Lord",
  "14:5": "Cloud and Fire Return"
};

for (const [ch, verses] of Object.entries(chapters)) {
  const chDiv = document.createElement('div');
  const chHead = document.createElement('div');
  chHead.className = 'chapter-heading';
  chHead.textContent = `Chapter ${ch}`;
  chDiv.appendChild(chHead);

  for (const verse of verses) {
    const key = `${ch}:${verse.v}`;

    // Pericope heading?
    if (pericopes[key]) {
      const peri = document.createElement('div');
      peri.className = 'pericope';
      peri.textContent = pericopes[key];
      chDiv.appendChild(peri);
    }

    const vDiv = document.createElement('div');
    vDiv.className = 'verse';

    const verseGlosses = glosses[key] || [];
    const fullText = verse.lines.join('\n');

    // Build the verse HTML with glosses applied
    let html = fullText;

    // Sort glosses by phrase length descending to avoid substring issues
    const sorted = [...verseGlosses].sort((a, b) => b.phrase.length - a.phrase.length);
    for (const g of sorted) {
      const escaped = g.phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      // Use a unique placeholder to avoid double-matching
      const re = new RegExp(escaped, 'i');
      const match = html.match(re);
      if (match) {
        const idx = html.indexOf(match[0]);
        const before = html.slice(0, idx);
        const after = html.slice(idx + match[0].length);
        const noteEsc = g.note.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        html = before + `<span class="gloss" data-cat="${g.category}" data-note="${noteEsc}">${match[0]}</span>` + after;
      }
    }

    // Convert line breaks
    const lines = html.split('\n');
    let verseHtml = '';
    for (let i = 0; i < lines.length; i++) {
      if (i === 0) {
        verseHtml += `<span class="verse-num">${verse.v}</span>${lines[i]}\n`;
      } else {
        verseHtml += `<span class="verse-line">${lines[i]}</span>\n`;
      }
    }

    vDiv.innerHTML = verseHtml;
    chDiv.appendChild(vDiv);
  }

  container.appendChild(chDiv);
}

// Popover logic
let activePopover = null;
let activeGloss = null;

document.addEventListener('click', (e) => {
  const gloss = e.target.closest('.gloss');

  // Close any existing popover
  if (activePopover) {
    activePopover.remove();
    if (activeGloss === gloss) {
      activePopover = null;
      activeGloss = null;
      return; // Toggle off
    }
    activePopover = null;
    activeGloss = null;
  }

  if (!gloss) return;

  const note = gloss.dataset.note;
  const cat = gloss.dataset.cat;

  const pop = document.createElement('div');
  pop.className = 'gloss-popover show';
  pop.innerHTML = `<div class="cat-badge ${cat}">${cat}</div><div>${note}</div>`;

  gloss.style.position = 'relative';
  gloss.appendChild(pop);

  // Reposition if off-screen
  const rect = pop.getBoundingClientRect();
  if (rect.left < 8) {
    pop.style.left = '0';
    pop.style.transform = 'none';
  } else if (rect.right > window.innerWidth - 8) {
    pop.style.left = 'auto';
    pop.style.right = '0';
    pop.style.transform = 'none';
  }
  if (rect.top < 8) {
    pop.style.bottom = 'auto';
    pop.style.top = 'calc(100% + 8px)';
  }

  activePopover = pop;
  activeGloss = gloss;
  e.stopPropagation();
});
</script>
</body>
</html>
